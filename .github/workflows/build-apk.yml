name: Build MHWarp APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradlew မလိုဘဲ Gradle ကို တိုက်ရိုက်ခေါ်သုံးမည့် အပိုင်း
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # chmod +x gradlew နှင့် ./gradlew အစား gradle ကို တိုက်ရိုက်သုံးသည်
      - name: Build APK
        run: gradle assembleDebug 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MHWarp-App
          path: app/build/outputs/apk/debug/*.apk
