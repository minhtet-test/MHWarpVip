name: Build MHWARPvpn APK

# မည်သည့်အချိန်တွင် အလုပ်လုပ်မည်နည်း
on:
  push:
    branches: [ "main", "master" ] # main သို့မဟုတ် master branch ကို code တင်တိုင်း build မည်
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # GitHub Website ရှိ Actions tab မှ ကိုယ်တိုင်နှိပ်၍ ခိုင်းစေနိုင်ရန်

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: 🛠️ Build Debug APK with Gradle
        run: ./gradlew assembleDebug

      - name: 🚀 Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MHWARPvpn-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # APK ကို ၇ ရက်အထိ သိမ်းဆည်းထားမည်
